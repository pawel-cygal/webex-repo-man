<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job - Webex Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-robot"></i> Webex Repo Man
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Edit Scheduled Job</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('main.edit_job', job_id=job.id) }}" method="POST" id="edit-job-form">
                    <div class="mb-3">
                        <label for="name" class="form-label">Job Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ job.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="channel_id" class="form-label">Channel</label>
                        <select class="form-select" id="channel_id" name="channel_id" required>
                            {% for channel in channels %}
                            <option value="{{ channel.id }}" {% if channel.id == job.channel_id %}selected{% endif %}>{{ channel.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" name="message" rows="5" required>{{ job.message }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="frequency" class="form-label">Frequency</label>
                            <select class="form-select" id="frequency" name="frequency">
                                {% for freq in ['daily', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'] %}
                                <option value="{{ freq }}" {% if freq == job.frequency %}selected{% endif %}>{{ freq.capitalize() }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="schedule_time" class="form-label">Time</label>
                            <input type="time" class="form-control" id="schedule_time" name="schedule_time" value="{{ job.schedule_time }}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="timezone" class="form-label">Timezone</label>
                            <select class="form-select" id="timezone" name="timezone">
                                {% for tz in timezones %}
                                <option value="{{ tz }}" {% if tz == job.timezone %}selected{% endif %}>{{ tz }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="mentions" class="form-label">Mentions (Optional)</label>
                        <input type="text" class="form-control" id="mentions" name="mentions" value="{{ job.mentions or '' }}" placeholder="Comma-separated emails">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if job.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Job is Active</label>
                    </div>
                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('main.index') }}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Update Job
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
