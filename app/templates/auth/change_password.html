<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change password — Webex Repo Man</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width: 480px; margin-top: 6vh;">
    <div class="text-center mb-4">
        <h3><i class="bi bi-key"></i> Change password</h3>
        <p class="text-muted">You must choose a new password before continuing.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST" action="{{ url_for('auth.change_password') }}">
                <div class="mb-3">
                    <label class="form-label">Current password</label>
                    <input type="password" class="form-control" name="current_password" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">New password</label>
                    <input type="password" class="form-control" name="new_password" minlength="8" required>
                    <div class="form-text">Minimum 8 characters.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm new password</label>
                    <input type="password" class="form-control" name="confirm_password" minlength="8" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Update password</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
